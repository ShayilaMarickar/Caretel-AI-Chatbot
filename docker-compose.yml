services:
  postgres:
    image: postgres:17-alpine
    container_name: caretel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_MULTIPLE_DATABASES: ${N8N_DB_NAME},${APP_DB_NAME}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - caretel_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Internal-only: no ports exposed to host, per infra decision

  n8n:
    image: n8nio/n8n:latest
    container_name: caretel_n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      TZ: ${TZ}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      DB_TYPE: ${DB_TYPE}
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: ${DB_POSTGRESDB_PORT}
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: ${DB_POSTGRESDB_SCHEMA}
      #N8N_RESTRICT_FILE_ACCESS_TO: /home/node/.n8n-files,/home/node/knowledge-base
    ports:
      - "5678:5678"   # n8n UI needs host access — this is your only exposed port
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
      - ./knowledge-base/documents:/home/node/.n8n-files/knowledge-base
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets n8n reach Ollama on Windows host
    networks:
      - caretel_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: caretel_qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      TZ: ${TZ}
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - caretel_network
    # Internal-only: no ports exposed to host, per infra decision

networks:
  caretel_network:
    driver: bridge
    name: caretel_network

volumes:
  postgres_data:
    name: caretel_postgres_data
  n8n_data:
    name: caretel_n8n_data
  qdrant_data:
    name: caretel_qdrant_data